<!DOCTYPE html>
<html>
<head>
  <title>ZPL Viewer</title>
<style>
#current img {
  width: 400px;
  border: 4px solid green;
  transition: transform 0.3s ease;
}

#history {
  height: 300px;
  overflow-y: auto;
  border: 1px solid #ccc;
  padding: 10px;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* 🔥 smooth slide animation */
.history-item {
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.4s ease;
}

.history-item.show {
  opacity: 1;
  transform: translateY(0);
}

.meta {
  font-size: 12px;
  color: #555;
}
</style>

</head>
<body>

<h2>📦 Last 10 Labels</h2>

<h2>📦 Live Labels</h2>

<div id="current"></div>

<hr/>

<div id="history"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();

let labels = [];

const currentDiv = document.getElementById("current");
const historyDiv = document.getElementById("history");

socket.on("new_label", (labelData) => {
    labels.unshift(labelData);
    labels = labels.slice(0, 10);

    updateUI(labelData);
});

function updateUI(newLabel) {
    // 🔥 CURRENT LABEL
    currentDiv.innerHTML = "";

    const img = document.createElement("img");
    img.src = "data:image/png;base64," + newLabel.image;

    // pop animation
    img.style.transform = "scale(1.1)";
    setTimeout(() => {
        img.style.transform = "scale(1)";
    }, 150);

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerText = `ID: ${newLabel.id} | ${newLabel.timestamp}`;

    currentDiv.appendChild(img);
    currentDiv.appendChild(meta);

    // 📜 MOVE previous current into history
    if (labels.length > 1) {
        const prev = labels[1];

        const item = document.createElement("div");
        item.className = "history-item";

        const img = document.createElement("img");
        img.src = "data:image/png;base64," + prev.image;
        img.style.width = "200px";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerText = `ID: ${prev.id} | ${prev.timestamp}`;

        item.appendChild(img);
        item.appendChild(meta);

        // insert at top
        historyDiv.insertBefore(item, historyDiv.firstChild);

        // 🔥 trigger animation
        setTimeout(() => {
            item.classList.add("show");
        }, 10);
    }

    // 🧹 keep only last 9 in history
    while (historyDiv.children.length > 9) {
        historyDiv.removeChild(historyDiv.lastChild);
    }

    socket.on("new_label", (labelData) => {
    console.log("RECEIVED:", labelData);
});
}
</script>

</body>
</html>
